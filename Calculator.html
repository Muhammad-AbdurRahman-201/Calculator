<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

.container-fluid{
    background: linear-gradient(to bottom right, black, rgb(102,57,187));
    min-height:100vh;
}


.calculator{
    width:320px;
    background:black;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}


.display{
    height:60px;
    background:#111;
    color:white;
    font-size: clamp(24px, 2vw, 28px); 
  
    white-space: nowrap;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    overflow: auto;
   overflow-x:auto;
white-space:nowrap;
    
}

.btn-calc{
    height:60px;
    font-size:24px;
    font-weight: 700;
    margin:3px;
    border-radius:10px;
}
.btn-calc:hover{
    opacity: 0.9;
}

</style>
</head>

<body>

<div class="container-fluid d-flex justify-content-center align-items-center">

<div class="calculator">

<div class="display "></div>

<div class="row ">

<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(9)">9</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(8)">8</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(7)">7</button>
</div>
<div class="col-3">
    <button class="btn btn-warning w-100 btn-calc"onclick="addvalue('+')">+</button>
</div>

<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(6)">6</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(5)">5</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(4)">4</button>
</div>
<div class="col-3">
    <button class="btn btn-warning w-100 btn-calc"onclick="addvalue('-')">-</button>
</div>

<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(3)">3</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(2)">2</button>
</div>
<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(1)">1</button>
</div>
<div class="col-3">
    <button class="btn btn-warning w-100 btn-calc"onclick="addvalue('*')">*</button>
</div>

<div class="col-3">
    <button class="btn btn-light w-100 btn-calc"onclick="addvalue(0)">0</button>
</div>
<div class="col-3">
   <button class="btn btn-danger w-100 btn-calc "onclick="del()">
      <i class="bi bi-backspace"></i>
   </button>
</div>
<div class="col-3">
    <button class="btn btn-success w-100 btn-calc"onclick="add()"  >=</button>
</div>
<div class="col-3">
    <button class="btn btn-warning w-100 btn-calc "onclick="addvalue('/')">/</button>
</div>

</div>

</div>

</div>

</body>
</html>
<script>

let display = document.querySelector(".display")
function addvalue(value) {
    if (display.innerText=="") {
        display.innerText=value
    } else {

        display.innerHTML+=value
        
    }


}
 let operators = ["+","-","*","/"]
 let ope=["/","*"]

function add() {
let first = display.innerText[0]
lastCharacter = display.innerText.slice(-1)
let text = display.innerText
let hasDoubleOperator =
/[+\-*/]{2,}/.test(text)
if (operators.includes(lastCharacter) || ope.includes(first) || hasDoubleOperator  ) {
    alert("Math Error")
    return
  
}

    display.innerHTML=eval(display.innerText)
}
function del(){
display.innerText =
display.innerText.slice(0,-1)
} 

</script>
