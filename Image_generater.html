<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Generator</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
*{
    padding: 0;
    margin: 0;
}

html, body {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
}

.container-fluid {
    min-height: 100vh;
    background: linear-gradient(135deg,#2a0f0f,#020617);
}
.men{
    background: linear-gradient(90deg,#ed3a3a,#ee7422);
    color: white;
    padding: 10px;
}
.form-control{
    max-width: 300px;
    text-align: center;
    background-color: #111827;
    color: white; 
    border: 1px solid #374151;
    transition: all 0.35s ease;
}
.form-control:hover{
    background-color: #1f2937;
    border: 1px solid #ed3a3a;
    box-shadow: 0 0 8px rgba(237,58,58,0.4);
    color: white; 
}


.form-control:focus{
    outline: none;
    border: 1px solid #ee7422;
    box-shadow: 0 0 15px rgba(238,116,34,0.7);
    transform: scale(1.05);
    color: white;
}


.form-control::placeholder{
    color: #9ca3af;
}


.btn-outline-danger{
    border: none;
    background: linear-gradient(45deg,#160533,#770909);
    color: white;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
}
.btn-outline-danger:hover{
    background: linear-gradient(45deg,#3a0202,#0b001f);
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
}

.btn-outline-danger:active{
    transform: scale(0.95);
}

.btn-outline-danger::after{
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
    transition: 0.5s;
}

.btn-outline-danger:hover::after{
    left: 100%;
}

.img-fluid {
    max-width: 460px;
    max-height: 400px;   
    width: 100%;        
    height: auto;       
    display: none;
    border-radius: 8px;
    object-fit: contain;

    animation: imageShow 0.6s ease;
}

@keyframes shake {
    0%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    40%{ transform: translateX(6px); }
    60%{ transform: translateX(-6px); }
    80%{ transform: translateX(6px); }
    100%{ transform: translateX(0); }
}


.form-control:invalid{
    animation: shake 0.3s;
    border: 1px solid red;
}
@keyframes imageShow {
    from{
        opacity: 0;
        transform: scale(0.85);
    }
    to{
        opacity: 1;
        transform: scale(1);
    }
}

.Loading{
    color: #9ca3af;
    margin-top: 10px;
}
.Loading:hover{
    color: #e97979;
}


.going {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
</style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    <div class="col-12 men">
        <h1 class="text-center h1">Image Generator</h1>
    </div>
  </div>
  <div class="row">
    <div class="col-12 mt-5 ms-2 d-flex align-items-center justify-content-center">
      <div class="input-group" style="max-width: 400px;">
        <input type="text" class="form-control" placeholder="Enter your text" aria-label="Input for image">
        <button class="btn btn-outline-danger" type="button">Generate</button>
      </div>
    </div>
    <div class="col-12 d-flex justify-content-center align-items-center going">
        <h6 class="h6 Loading"></h6>
        <img src="" class="img-fluid mt-5 ms-1" alt="Generated Image">
       
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let input = document.querySelector(".form-control");
let btn = document.querySelector(".btn");
let going = document.querySelector(".going");

input.addEventListener("input", function() {
    if(this.value.length > 0){
        this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();
    }
});

btn.addEventListener("click", function() {
    let inputs = input.value.trim();
    if (inputs === "") {
        alert("Please fill the input form!");
        return;
    }

    let url = `https://text2img.hideme.eu.org/image?prompt=${inputs}&model=flux`;
    let img = document.querySelector(".img-fluid");
    let p = document.querySelector(".Loading");

    p.innerText = "Generating image...";
    img.style.display = "none";

    img.onload = () => {
        p.innerText = "  Right-click on the image to download it.";
        img.style.display = "block";

    }

    img.src = url;
});
</script>
</body>
</html>
